<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>OCR Biology A Level Progress Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: rgba(102, 126, 234, 0.3);
        }
        
        html {
            -webkit-text-size-adjust: 100%;
            font-size: 16px;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 10px;
            line-height: 1.5;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        
        h1 {
            color: #667eea;
            font-size: 1.5em;
            margin-bottom: 8px;
            text-align: center;
        }
        
        .subtitle {
            color: #666;
            font-size: 0.9em;
            text-align: center;
            margin-bottom: 15px;
        }
        
        .info-box {
            background: #e3f2fd;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 0.85em;
            border-left: 3px solid #2196f3;
        }
        
        .progress-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
        }
        
        .progress-bar-container {
            background: rgba(255,255,255,0.3);
            height: 30px;
            border-radius: 15px;
            overflow: hidden;
            margin: 10px 0;
        }
        
        .progress-bar {
            height: 100%;
            background: #4caf50;
            width: 0%;
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.9em;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 10px;
            font-size: 0.85em;
        }
        
        .stat {
            background: rgba(255,255,255,0.2);
            padding: 10px;
            border-radius: 8px;
            text-align: center;
        }
        
        .stat-number {
            font-size: 1.8em;
            font-weight: bold;
            display: block;
        }
        
        .controls {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            font-size: 0.85em;
            font-weight: 600;
            color: white;
            background: #667eea;
            cursor: pointer;
            min-height: 44px;
            flex: 1 1 auto;
            min-width: 120px;
        }
        
        .btn-secondary {
            background: #f44336;
        }
        
        .btn-tertiary {
            background: #4caf50;
        }
        
        .module {
            background: #f8f9fa;
            border-radius: 10px;
            margin-bottom: 15px;
            overflow: hidden;
            border: 2px solid #e0e0e0;
        }
        
        .module-header {
            padding: 15px;
            background: white;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            min-height: 60px;
        }
        
        .module-header:active {
            background: #f5f5f5;
        }
        
        .module-title {
            font-size: 1.1em;
            font-weight: bold;
            color: #333;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .toggle-icon {
            font-size: 1.2em;
            transition: transform 0.3s ease;
        }
        
        .toggle-icon.open {
            transform: rotate(180deg);
        }
        
        .module-stats {
            display: flex;
            gap: 8px;
            font-size: 0.75em;
        }
        
        .module-stat {
            padding: 4px 8px;
            border-radius: 5px;
            font-weight: bold;
        }
        
        .stat-complete {
            background: #c8e6c9;
            color: #2e7d32;
        }
        
        .stat-practice {
            background: #fff9c4;
            color: #f57f17;
        }
        
        .stat-review {
            background: #ffcdd2;
            color: #c62828;
        }
        
        .module-content {
            display: none;
            padding: 10px;
        }
        
        .module-content.open {
            display: block;
        }
        
        .topic {
            background: white;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
        }
        
        .topic-title {
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
            font-size: 0.95em;
        }
        
        .statement {
            background: #f9f9f9;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 8px;
            border: 2px solid #e0e0e0;
        }
        
        .statement.complete {
            background: #f1f8f4;
            border-color: #4caf50;
        }
        
        .statement.practice {
            background: #fffef7;
            border-color: #ff9800;
        }
        
        .statement.review {
            background: #fff5f5;
            border-color: #f44336;
        }
        
        .statement-text {
            margin-bottom: 8px;
            font-size: 0.9em;
            line-height: 1.4;
        }
        
        .status-btns {
            display: flex;
            gap: 6px;
        }
        
        .status-btn {
            flex: 1;
            padding: 8px;
            border: 2px solid #ddd;
            background: white;
            border-radius: 6px;
            font-size: 0.75em;
            font-weight: 600;
            cursor: pointer;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .status-btn:active {
            transform: scale(0.98);
        }
        
        .status-btn.active-complete {
            background: #4caf50;
            color: white;
            border-color: #4caf50;
        }
        
        .status-btn.active-practice {
            background: #ff9800;
            color: white;
            border-color: #ff9800;
        }
        
        .status-btn.active-review {
            background: #f44336;
            color: white;
            border-color: #f44336;
        }
        
        .legend {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 15px;
            font-size: 0.85em;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f8f9fa;
            padding: 8px;
            border-radius: 6px;
        }
        
        .legend-color {
            width: 16px;
            height: 16px;
            border-radius: 3px;
            flex-shrink: 0;
        }
        
        @media (min-width: 600px) {
            .container {
                padding: 30px;
            }
            
            h1 {
                font-size: 2em;
            }
            
            .stats {
                grid-template-columns: repeat(4, 1fr);
            }
            
            .legend {
                flex-direction: row;
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 OCR Biology A Level Tracker</h1>
        <div class="subtitle">Essential Learning Statements • H420</div>
        
        <div class="info-box">
            <strong>💡 How to use:</strong> Tap Complete ✅, Practice ⚠️, or Review ❌ for each statement. Progress saves automatically!
        </div>

        <div class="progress-section">
            <strong>📊 Your Progress</strong>
            <div class="progress-bar-container">
                <div class="progress-bar" id="progressBar">0%</div>
            </div>
            <div class="stats">
                <div class="stat">
                    <span class="stat-number" id="completeCount">0</span>
                    <span>Complete</span>
                </div>
                <div class="stat">
                    <span class="stat-number" id="practiceCount">0</span>
                    <span>Practice</span>
                </div>
                <div class="stat">
                    <span class="stat-number" id="reviewCount">0</span>
                    <span>Review</span>
                </div>
                <div class="stat">
                    <span class="stat-number" id="notStartedCount">0</span>
                    <span>Not Started</span>
                </div>
            </div>
        </div>

        <div class="controls">
            <button class="btn" onclick="expandAll()">📂 Expand All</button>
            <button class="btn" onclick="collapseAll()">📁 Collapse All</button>
            <button class="btn btn-tertiary" onclick="exportData()">💾 Export</button>
            <button class="btn btn-secondary" onclick="resetAll()">🔄 Reset</button>
        </div>

        <div class="legend">
            <div class="legend-item">
                <div class="legend-color" style="background: #4caf50;"></div>
                <span><strong>Complete:</strong> Confident</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #ff9800;"></div>
                <span><strong>Practice:</strong> Need work</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #f44336;"></div>
                <span><strong>Review:</strong> Need study</span>
            </div>
        </div>

        <div id="modules"></div>
    </div>

    <script>

                    "I know mitochondria structure",

                    "I can explain link reaction: pyruvate → acetyl CoA",

                    "I understand gene mutations: substitution, insertion, deletion",

                    "I understand artificial cloning in animals (embryo twinning, SCNT)",

                    "I understand batch and continuous fermentation",
                    "I know bacterial growth curve: lag, log, stationary, death",
                    "I understand immobilised enzymes and uses",
                    "I can calculate biomass transfer efficiency",
                    "I understand nitrogen cycle: nitrification, fixation, denitrification",
                    "I understand carbon cycle: photosynthesis, respiration, decomposition",
                    "I can explain primary succession: pioneer to climax community",

        let stateData = {};

        function init() {
            loadState();
            renderModules();
            updateStats();
        }

        function renderModules() {
            const container = document.getElementById('modules');
            container.innerHTML = '';
            
            Object.keys(data).forEach((moduleName, moduleIndex) => {
                const moduleDiv = document.createElement('div');
                moduleDiv.className = 'module';
                moduleDiv.innerHTML = `
                    <div class="module-header" onclick="toggleModule(${moduleIndex})">
                        <div class="module-title">
                            <span class="toggle-icon" id="icon-${moduleIndex}">▼</span>
                            <span>${moduleName}</span>
                        </div>
                        <div class="module-stats">
                            <span class="module-stat stat-complete" id="mod-complete-${moduleIndex}">0</span>
                            <span class="module-stat stat-practice" id="mod-practice-${moduleIndex}">0</span>
                            <span class="module-stat stat-review" id="mod-review-${moduleIndex}">0</span>
                        </div>
                    </div>
                    <div class="module-content" id="content-${moduleIndex}">
                        ${renderTopics(data[moduleName], moduleIndex)}
                    </div>
                `;
                container.appendChild(moduleDiv);
            });
        }

        function renderTopics(topics, moduleIndex) {
            let html = '';
            Object.keys(topics).forEach((topicName, topicIndex) => {
                html += `<div class="topic">
                    <div class="topic-title">${topicName}</div>`;
                topics[topicName].forEach((statement, stmtIndex) => {
                    const id = `${moduleIndex}-${topicIndex}-${stmtIndex}`;
                    const state = stateData[id] || 'none';
                    html += `
                        <div class="statement ${state}" id="stmt-${id}">
                            <div class="statement-text">${statement}</div>
                            <div class="status-btns">
                                <button class="status-btn ${state === 'complete' ? 'active-complete' : ''}" 
                                    onclick="setState('${id}', 'complete')">✅</button>
                                <button class="status-btn ${state === 'practice' ? 'active-practice' : ''}" 
                                    onclick="setState('${id}', 'practice')">⚠️</button>
                                <button class="status-btn ${state === 'review' ? 'active-review' : ''}" 
                                    onclick="setState('${id}', 'review')">❌</button>
                            </div>
                        </div>
                    `;
                });
                html += '</div>';
            });
            return html;
        }

        function toggleModule(index) {
            const content = document.getElementById('content-' + index);
            const icon = document.getElementById('icon-' + index);
            
            if (content.classList.contains('open')) {
                content.classList.remove('open');
                icon.classList.remove('open');
            } else {
                content.classList.add('open');
                icon.classList.add('open');
            }
        }

        function setState(id, status) {
            if (stateData[id] === status) {
                stateData[id] = 'none';
            } else {
                stateData[id] = status;
            }
            
            saveState();
            
            const stmt = document.getElementById('stmt-' + id);
            stmt.className = 'statement ' + stateData[id];
            
            const btns = stmt.querySelectorAll('.status-btn');
            btns[0].className = 'status-btn' + (stateData[id] === 'complete' ? ' active-complete' : '');
            btns[1].className = 'status-btn' + (stateData[id] === 'practice' ? ' active-practice' : '');
            btns[2].className = 'status-btn' + (stateData[id] === 'review' ? ' active-review' : '');
            
            updateStats();
        }

        function updateStats() {
            let complete = 0, practice = 0, review = 0, total = 0;
            
            Object.keys(data).forEach((moduleName, moduleIndex) => {
                let modComplete = 0, modPractice = 0, modReview = 0;
                
                Object.keys(data[moduleName]).forEach((topicName, topicIndex) => {
                    data[moduleName][topicName].forEach((stmt, stmtIndex) => {
                        const id = `${moduleIndex}-${topicIndex}-${stmtIndex}`;
                        const state = stateData[id] || 'none';
                        total++;
                        
                        if (state === 'complete') { complete++; modComplete++; }
                        else if (state === 'practice') { practice++; modPractice++; }
                        else if (state === 'review') { review++; modReview++; }
                    });
                });
                
                document.getElementById('mod-complete-' + moduleIndex).textContent = modComplete;
                document.getElementById('mod-practice-' + moduleIndex).textContent = modPractice;
                document.getElementById('mod-review-' + moduleIndex).textContent = modReview;
            });
            
            const notStarted = total - complete - practice - review;
            const percent = Math.round((complete / total) * 100);
            
            document.getElementById('completeCount').textContent = complete;
            document.getElementById('practiceCount').textContent = practice;
            document.getElementById('reviewCount').textContent = review;
            document.getElementById('notStartedCount').textContent = notStarted;
            document.getElementById('progressBar').style.width = percent + '%';
            document.getElementById('progressBar').textContent = percent + '%';
        }

        function expandAll() {
            Object.keys(data).forEach((_, index) => {
                document.getElementById('content-' + index).classList.add('open');
                document.getElementById('icon-' + index).classList.add('open');
            });
        }

        function collapseAll() {
            Object.keys(data).forEach((_, index) => {
                document.getElementById('content-' + index).classList.remove('open');
                document.getElementById('icon-' + index).classList.remove('open');
            });
        }

        function saveState() {
            try {
                localStorage.setItem('ocrBioTrackerMobile', JSON.stringify(stateData));
            } catch (e) {
                console.error('Save failed:', e);
            }
        }

        function loadState() {
            try {
                const saved = localStorage.getItem('ocrBioTrackerMobile');
                if (saved) {
                    stateData = JSON.parse(saved);
                }
            } catch (e) {
                console.error('Load failed:', e);
                stateData = {};
            }
        }

        function exportData() {
            const exportObj = {
                date: new Date().toISOString(),
                name: prompt('Your name (optional):') || 'Student',
                data: stateData
            };
            
            const blob = new Blob([JSON.stringify(exportObj, null, 2)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'biology_progress_' + new Date().toISOString().split('T')[0] + '.json';
            a.click();
            
            alert('Progress exported! Save this file to backup your data.');
        }

        function resetAll() {
            if (confirm('Reset ALL progress? This cannot be undone!')) {
                stateData = {};
                saveState();
                renderModules();
                updateStats();
            }
        }

        init();
    </script>
</body>
</html>
